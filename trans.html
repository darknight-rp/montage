        <h1>Транспортна лента</h1>

        <h1>Редлер</h1>
        <p>Индустриално съоръжение за непрекъснат транспорт на зърнени храни и други насипни продукти в силози, фуражни заводи и преработващи предприятия.</p>

<main class="container">
    <div class="grid">
        <section class="card">
            <h2>1. Предназначение и принцип на работа</h2>
            <h2>1. Предназначение и принцип на работа на редлера</h2>
            <p class="lead">
                Транспортната лента е гъвкаво транспортно съоръжение с непрекъснато действие. Тя служи за пренасяне на материали по хоризонтала или под наклон в рамките на технологични и производствени линии.
                Редлерът е предназначен за непрекъснат транспорт в хоризонтално направление или под ъгъл до 15° на всички видове зърнени храни в силозите за зърно, фуражните заводи и зърнопреработващите предприятия.
            </p>
            <p>
                Редлерите могат да се използват и за изваждане на продукти от бункери, когато са създадени условия за постепенно напълване на коритото. Материалът постъпва през приемното устройство в коритото на редлера, а движещата се в него безконечна верига придвижва с долния си клон продукта от входа към изхода.
            </p>
            <p>
                Материалът постъпва върху лентата, след което се придвижва плавно до желаната точка. Разтоварването се извършва в края на трасето, откъдето продуктът продължава своя път към следващия етап от производствения процес.
                За предпочитане е посоката на движение на продукта да бъде от опъващата към задвижващата станция, което осигурява по-стабилна и ефективна работа на съоръжението.
            </p>

            <h3>Основни предимства</h3>
            <ul class="feature-list">
                <li>
                    <strong>Непрекъснат транспорт</strong>
                    Подходяща е за постоянен поток от материали без прекъсване на работния цикъл.
                    Подходящ е за постоянен поток от зърнени и насипни продукти без прекъсване на технологичния процес.
                </li>
                <li>
                    <strong>Гъвкаво приложение</strong>
                    Използва се за сухи, влажни, насипни или парчести продукти в различни индустрии.
                    <strong>Работа в силозни системи</strong>
                    Използва се широко в силози, фуражни заводи и предприятия за обработка на зърно.
                </li>
                <li>
                    <strong>Лесно интегриране</strong>
                    Вписва се в технологични линии и подпомага автоматизацията на процесите.
                    <strong>Надеждно придвижване</strong>
                    Безконечната верига осигурява сигурно транспортиране на продукта от входа до изхода.
                </li>
            </ul>
        </section>

        <aside class="side-panel">
            <div class="image-wrap">
                <img src="https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=1200&q=80" alt="Индустриална транспортна лента">
                <img src="https://github.com/darknight-rp/montage/blob/main/lenta1.jpg?raw=true" alt="Индустриален редлер">
            </div>

            <div class="stat">
                <strong>24/7</strong>
                Проектирана за продължителна работа в производствени и складови условия.
                <strong>До 15°</strong>
                Подходящ за транспортиране в хоризонтално направление или под наклон до 15 градуса.
            </div>

            <div class="stat">
                <strong>Модулна система</strong>
                Позволява адаптиране според дължина, наклон и вид транспортиран материал.
                <strong>Силозна интеграция</strong>
                Работи ефективно в линии за съхранение, разтоварване и преработка на зърнени продукти.
            </div>
        </aside>
    </div>
        <h2>2. Устройство</h2>
        <ul class="device-list">
            <li>
                <strong>2.1. Задвижващ барабан</strong>
                Получава въртеливо движение чрез редуктор от електродвигател и предава постъпателно движение на гуменото платно. Връзката между електродвигателя, редуктора и барабана се осъществява посредством съединители. Барабаните се изработват от чугун или стоманена заварена конструкция.
                <strong>2.1. Задвижваща станция</strong>
                Метална конструкция, в която на търкалящи лагери лагерува оста на звездочката.
            </li>
            <li>
                <strong>2.2. Гумено платно</strong>
                Чрез него се извършва самото транспортиране на материала по цялата дължина на лентата.
                <strong>2.2. Натегателна станция</strong>
                Метална конструкция, в която на търкалящи лагери лагерува оста на опъващата ролка. Отстрани на корпуса, на конзоли, са разположени натегателните винтове.
            </li>
            <li>
                <strong>2.3. Поддържащи ролки</strong>
                Осигуряват поддържането на транспортната лента по трасето и се монтират върху специални стойки.
                <strong>2.3. Корито</strong>
                Метална конструкция, в която са поставени плъзгачи, по които се придвижва веригата.
            </li>
            <li>
                <strong>2.4. Опъващ барабан</strong>
                Създава необходимото натягане на гуменото платно, обезпечава сцеплението със задвижващия барабан и предотвратява излишните провисвания между ролките.
                <strong>2.4. Капак</strong>
                Метална конструкция за затваряне отгоре на задвижващата и натегателната станции и коритата. Закрепва се посредством болтове към тях.
            </li>
            <li>
                <strong>2.5. Верига</strong>
                Метална конструкция, състояща се от редуващи се звена без лопатки и звена с лопатки. Връзката между отделните звена се осъществява посредством болтове и гайки.
            </li>
            <li>
                <strong>2.6. Задвижване</strong>
                Според дължината и вида на транспортирания продукт е осъществено необходимото електро-задвижване.
            </li>
            <li>
                <strong>2.5. Задвижване</strong>
                Определя се според дължината на лентата и вида на транспортирания продукт, като осигурява необходимото електрозадвижване.
                <strong>2.7. Виеластик</strong>
                Служи за предаване на движението от мотор-редуктора към задвижващата станция.
            </li>
            <li>
                <strong>2.6. Носеща метална конструкция (рама)</strong>
                Изработва се от „У“ профили и обезпечава необходимата работна дължина и устойчивост на транспортната лента.
                <strong>2.8. Носеща конструкция</strong>
                Метална конструкция, която служи за повдигане на редлера на необходимата височина.
            </li>
        </ul>
